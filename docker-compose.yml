services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cnab240
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/cnab240
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      JWT_EXPIRES_IN: 24h
      FILES_DIR: /app/data/files
      CORS_ORIGIN: "*"
    volumes:
      - cnab_files:/app/data/files
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  mongo_data:
  cnab_files:
